name: TradeMinds CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-build:
    name: Validate and Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test


      - name: Build Application
        run: npm run build
        env:
          API_BASE_URL: "https://fakestoreapi.com"